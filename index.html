<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мессенджер</title>
    <style>
        :root {
            --bg: #0e0e0e;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --bg-hover: #2e2e2e;
            --bg-input: #242424;
            --bg-msg-self: #2a6fdb;
            --bg-msg-other: #242424;
            --text: #e4e4e4;
            --text2: #888;
            --border: #2b2b2b;
            --avatar-bg: #2a6fdb;
            --shadow: rgba(0,0,0,0.5);
            --transition: 0.2s ease;
        }
        [data-theme="light"] {
            --bg: #ffffff;
            --bg2: #f0f2f5;
            --bg3: #e4e6eb;
            --bg-hover: #d1d5db;
            --bg-input: #f0f2f5;
            --bg-msg-self: #0084ff;
            --bg-msg-other: #e4e6eb;
            --text: #050505;
            --text2: #65676b;
            --border: #ced0d4;
            --avatar-bg: #0084ff;
            --shadow: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background .2s; }

        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 14px; padding: 20px; background: var(--bg); }
        #loginScreen h1 { font-size: 32px; }
        #loginScreen input { width: 300px; max-width: 90%; padding: 14px 18px; border-radius: 40px; border: none; background: var(--bg-input); color: var(--text); font-size: 16px; outline: none; }
        #loginScreen .btn { width: 300px; max-width: 90%; padding: 14px; border: none; border-radius: 40px; background: var(--avatar-bg); color: #fff; font-weight: 600; font-size: 16px; cursor: pointer; }
        #loginScreen .toggle-link { color: var(--text2); cursor: pointer; font-size: 14px; text-decoration: underline; }
        #loginScreen .error { color: #e74c3c; font-size: 14px; min-height: 20px; }
        #loginScreen .remember { display: flex; align-items: center; gap: 8px; color: var(--text2); font-size: 14px; }

        #chatApp { display: none; height: 100vh; background: var(--bg); flex-direction: column; }

        .top-bar {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            gap: 8px;
            flex-shrink: 0;
            z-index: 30;
            position: relative;
        }
        .top-bar .menu-btn, .top-bar .settings-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .top-bar .title {
            flex: 1;
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .top-bar .screen-size {
            font-size: 14px;
            font-weight: 500;
            background: var(--bg3);
            padding: 2px 10px;
            border-radius: 16px;
            border: 1px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
        }

        .app-layout { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 300px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform .25s ease;
            z-index: 20;
        }
        .sidebar-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 17px; }
        .sidebar-header .add-btn { background: none; border: none; color: var(--avatar-bg); font-size: 22px; cursor: pointer; }
        .chat-list { flex: 1; overflow-y: auto; padding: 6px 0; }
        .chat-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: pointer; border-left: 3px solid transparent; transition: background .2s; }
        .chat-item:hover { background: var(--bg-hover); }
        .chat-item.active { background: var(--bg-hover); border-left-color: var(--avatar-bg); }
        .chat-item .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; color: #fff; flex-shrink: 0; overflow: hidden; }
        .chat-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-item .info { flex: 1; overflow: hidden; }
        .chat-item .info .name { font-weight: 500; font-size: 14px; }
        .chat-item .info .last-msg { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .time { font-size: 11px; color: var(--text2); flex-shrink: 0; }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-width: 0;
            transition: opacity .2s;
        }
        .chat-panel-header { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg2); flex-shrink: 0; }
        .chat-panel-header .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; flex-shrink: 0; overflow: hidden; }
        .chat-panel-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-panel-header .name { font-weight: 500; font-size: 15px; }
        .chat-panel-header .status { font-size: 12px; color: var(--text2); }

        .messages-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px; background: var(--bg); }
        .msg { max-width: 80%; padding: 6px 12px; border-radius: 14px; line-height: 1.4; font-size: 14px; word-wrap: break-word; position: relative; animation: fadeInUp 0.3s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .msg.self { align-self: flex-end; background: var(--bg-msg-self); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--bg-msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .msg .time { font-size: 10px; opacity: 0.6; margin-top: 2px; display: block; }
        .msg .del { background: none; border: none; color: #f87171; cursor: pointer; font-size: 11px; margin-left: 6px; opacity: 0.5; }
        .msg .del:hover { opacity: 1; }
        .msg img { max-width: 160px; max-height: 120px; border-radius: 8px; margin-top: 4px; display: block; cursor: pointer; }

        .input-area {
            padding: 6px 10px;
            border-top: 1px solid var(--border);
            background: var(--bg2);
            display: flex;
            gap: 5px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border-radius: 18px;
            border: none;
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            outline: none;
            min-width: 0;
        }
        .input-area .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 18px;
            background: var(--avatar-bg);
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .input-area .btn-sticker { background: #f59e0b; }
        .input-area .btn-sticker:hover { background: #d97706; }

        .sticker-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 2000; }
        .sticker-modal.open { display: flex; }
        .sticker-modal-content { background: var(--bg2); border-radius: 16px; width: 90%; max-width: 500px; max-height: 80vh; padding: 14px; display: flex; flex-direction: column; overflow: hidden; }
        .sticker-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sticker-modal-header input { flex: 1; padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 13px; outline: none; margin-right: 8px; }
        .sticker-modal-header .close { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }
        .sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; overflow-y: auto; padding: 6px 0; flex: 1; }
        .sticker-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.15s; border: 2px solid transparent; }
        .sticker-grid img:hover { border-color: var(--avatar-bg); transform: scale(1.02); }
        .sticker-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
        .sticker-tabs button { padding: 4px 10px; border: none; border-radius: 14px; background: var(--bg3); color: var(--text); cursor: pointer; font-size: 12px; }
        .sticker-tabs button.active { background: var(--avatar-bg); color: #fff; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg2); padding: 20px; border-radius: 14px; width: 300px; max-width: 90%; }
        .modal h3 { margin-bottom: 10px; }
        .modal input { width: 100%; padding: 10px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 15px; outline: none; margin-bottom: 10px; }
        .modal .btn { width: 100%; padding: 10px; border: none; border-radius: 18px; background: var(--avatar-bg); color: #fff; font-weight: 600; cursor: pointer; }
        .modal .btn-close { background: transparent; color: var(--text2); margin-top: 6px; }

        .settings-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 999; padding: 20px; flex-direction: column; gap: 14px; overflow-y: auto; }
        .settings-panel.open { display: flex; }
        .settings-panel .back { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; align-self: flex-start; }
        .settings-panel label { font-weight: 500; }
        .settings-panel input { padding: 8px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 14px; outline: none; }
        .settings-panel .theme-toggle { display: flex; gap: 10px; margin: 6px 0; }
        .settings-panel .theme-toggle button { flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: 16px; background: transparent; color: var(--text); cursor: pointer; font-weight: 500; }
        .settings-panel .theme-toggle button.active { border-color: var(--avatar-bg); background: var(--bg-hover); }
        .settings-panel .logout-btn { background: #e74c3c; color: #fff; border: none; padding: 10px; border-radius: 16px; font-weight: 600; cursor: pointer; }

        .toast-container {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg2);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 3000;
            display: none;
            font-size: 13px;
            border: 1px solid var(--border);
        }
        .toast-container.show { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 700px) {
            .sidebar {
                position: absolute;
                top: 0; left: 0; bottom: 0;
                width: 260px;
                transform: translateX(-100%);
                z-index: 20;
                background: var(--bg2);
                box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            }
            .sidebar.open { transform: translateX(0); }
            .chat-panel.shifted { opacity: 0.3; pointer-events: none; }
            .chat-panel { width: 100%; }
            .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
            .input-area { padding: 4px 8px; gap: 4px; }
            .input-area input[type="text"] { font-size: 13px; padding: 6px 10px; }
            .input-area .btn { padding: 5px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="loginScreen">
        <h1>📱 Мессенджер</h1>
        <div id="loginError" class="error"></div>
        <input type="text" id="loginInput" placeholder="Логин" autocomplete="username">
        <input type="password" id="passInput" placeholder="Пароль" autocomplete="current-password">
        <div class="remember">
            <input type="checkbox" id="rememberCheck" checked> <label for="rememberCheck">Запомнить меня</label>
        </div>
        <button class="btn" id="loginBtn">Войти</button>
        <span class="toggle-link" id="toggleLogin">Нет аккаунта? Зарегистрироваться</span>
    </div>

    <!-- ЧАТ -->
    <div id="chatApp">
        <div class="top-bar">
            <button class="menu-btn" id="menuBtn">☰</button>
            <span class="title" id="topTitle">Чаты</span>
            <span class="screen-size" id="screenSizeDisplay" title="Клик – скопировать размер">📐 0×0</span>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        <div class="app-layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>Чаты</h2>
                    <button class="add-btn" id="addContactBtn">➕</button>
                </div>
                <div class="chat-list" id="chatList">
                    <!-- Глобальный чат -->
                    <div class="chat-item active" data-chat="global" id="chatGlobal">
                        <div class="avatar">🌍</div>
                        <div class="info">
                            <div class="name">Глобальный чат</div>
                            <div class="last-msg" id="globalLastMsg">Добро пожаловать!</div>
                        </div>
                        <div class="time" id="globalTime"></div>
                    </div>
                </div>
            </div>
            <div class="chat-panel" id="chatPanel">
                <div class="chat-panel-header">
                    <div class="avatar" id="panelAvatar">🌍</div>
                    <div>
                        <div class="name" id="panelName">Глобальный чат</div>
                        <div class="status" id="panelStatus">онлайн</div>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea">
                    <div style="color:var(--text2); text-align:center; margin-top:40px;">💬 Начните общение</div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." maxlength="500" autocomplete="off">
                    <button class="btn btn-sticker" id="stickerBtn">🐱</button>
                    <button class="btn" id="sendBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal-overlay" id="addContactModal">
        <div class="modal">
            <h3>Добавить контакт</h3>
            <input type="text" id="contactInput" placeholder="Введите ник пользователя">
            <button class="btn" id="confirmAddContact">Добавить</button>
            <button class="btn btn-close" id="closeModal">Отмена</button>
        </div>
    </div>

    <div class="sticker-modal" id="stickerModal">
        <div class="sticker-modal-content">
            <div class="sticker-modal-header">
                <input type="text" id="stickerSearchInput" placeholder="Поиск гифок...">
                <button class="close" id="closeStickerModal">✕</button>
            </div>
            <div class="sticker-tabs">
                <button class="active" data-tab="saved">📁 Мои</button>
                <button data-tab="search">🔍 Поиск</button>
            </div>
            <div class="sticker-grid" id="stickerGrid"></div>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <button class="back" id="settingsBack">← Назад</button>
        <h2>Настройки</h2>
        <label>Аватар (URL)</label>
        <input type="text" id="avatarUrlInput" placeholder="https://example.com/avatar.jpg">
        <label>Тема</label>
        <div class="theme-toggle">
            <button data-theme="dark" id="themeDark">🌙 Тёмная</button>
            <button data-theme="light" id="themeLight">☀️ Светлая</button>
        </div>
        <div style="background:var(--bg3); padding:8px; border-radius:10px; font-size:13px; color:var(--text2); text-align:center; border:1px solid var(--border);">
            Размер окна: <span id="settingsScreenWidth">0</span> × <span id="settingsScreenHeight">0</span> px
        </div>
        <button class="logout-btn" id="settingsLogout">Выйти</button>
    </div>

    <div class="toast-container" id="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // ============================================================
        // КОНФИГ
        // ============================================================
        const DB_URL = 'https://makc-894d6-default-rtdb.firebaseio.com/';
        const GIPHY_API_KEY = 'd6yTgfwrs03OJkuyfjfPiPmNp4fUDbEY';

        // Инициализация Firebase
        firebase.initializeApp({ databaseURL: DB_URL });
        const db = firebase.database();

        let currentUser = null;
        let currentChat = 'global';
        let isLogin = true;
        let chatListeners = {}; // для отписки от старых чатов
        let presenceRef = null;
        let usersCache = {};
        let stickerCache = [];

        // DOM элементы
        const $ = id => document.getElementById(id);
        const loginScreen = $('loginScreen');
        const chatApp = $('chatApp');
        const loginError = $('loginError');
        const loginInput = $('loginInput');
        const passInput = $('passInput');
        const rememberCheck = $('rememberCheck');
        const loginBtn = $('loginBtn');
        const toggleLogin = $('toggleLogin');
        const menuBtn = $('menuBtn');
        const settingsBtn = $('settingsBtn');
        const settingsPanel = $('settingsPanel');
        const settingsBack = $('settingsBack');
        const avatarUrlInput = $('avatarUrlInput');
        const themeDark = $('themeDark');
        const themeLight = $('themeLight');
        const settingsLogout = $('settingsLogout');
        const screenSizeDisplay = $('screenSizeDisplay');
        const settingsScreenWidth = $('settingsScreenWidth');
        const settingsScreenHeight = $('settingsScreenHeight');
        const addContactBtn = $('addContactBtn');
        const addContactModal = $('addContactModal');
        const contactInput = $('contactInput');
        const confirmAddContact = $('confirmAddContact');
        const closeModal = $('closeModal');
        const chatList = $('chatList');
        const chatGlobal = $('chatGlobal');
        const globalLastMsg = $('globalLastMsg');
        const globalTime = $('globalTime');
        const panelAvatar = $('panelAvatar');
        const panelName = $('panelName');
        const panelStatus = $('panelStatus');
        const messagesArea = $('messagesArea');
        const messageInput = $('messageInput');
        const sendBtn = $('sendBtn');
        const stickerBtn = $('stickerBtn');
        const sidebar = $('sidebar');
        const chatPanel = $('chatPanel');
        const stickerModal = $('stickerModal');
        const stickerSearchInput = $('stickerSearchInput');
        const stickerGrid = $('stickerGrid');
        const closeStickerModal = $('closeStickerModal');
        const stickerTabs = document.querySelectorAll('.sticker-tabs button');
        const toast = $('toast');

        // ============================================================
        // ПОЛЬЗОВАТЕЛИ (хранение в /users)
        // ============================================================
        async function registerUser(username, password) {
            const snap = await db.ref(`users/${username}`).once('value');
            if (snap.exists()) throw new Error('Пользователь уже существует');
            await db.ref(`users/${username}`).set({
                password,
                name: username,
                avatar: '',
            });
            return { username, name: username, avatar: '' };
        }

        async function loginUser(username, password) {
            const snap = await db.ref(`users/${username}`).once('value');
            if (!snap.exists()) throw new Error('Пользователь не найден');
            const user = snap.val();
            if (user.password !== password) throw new Error('Неверный пароль');
            return { username, ...user };
        }

        async function updateProfile(data) {
            if (!currentUser) return;
            await db.ref(`users/${currentUser.username}`).update(data);
            currentUser = { ...currentUser, ...data };
        }

        // ============================================================
        // ПРИСУТСТВИЕ (RTDB presence)
        // ============================================================
        function setupPresence() {
            if (!currentUser) return;
            const userPresenceRef = db.ref(`presence/${currentUser.username}`);
            userPresenceRef.set({
                username: currentUser.username,
                name: currentUser.name,
                lastSeen: firebase.database.ServerValue.TIMESTAMP,
            });
            userPresenceRef.onDisconnect().remove();
        }

        function listenPresence() {
            db.ref('presence').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                // Очистка старых записей (> 5 мин) не на клиенте, просто фильтруем
                for (let uname in data) {
                    const user = data[uname];
                    if (now - user.lastSeen > 300000) {
                        db.ref(`presence/${uname}`).remove();
                    }
                }
                updateOnlineStatuses();
            });
        }

        function updateOnlineStatuses() {
            // Обновим статусы в списке чатов
            document.querySelectorAll('.chat-item .status-indicator').forEach(el => el.remove());
            // Проще не добавлять индикаторы, а обновлять панель заголовка при смене чата
            if (currentChat !== 'global') {
                const isOnline = checkOnline(currentChat);
                panelStatus.textContent = isOnline ? 'онлайн' : 'офлайн';
                panelStatus.style.color = isOnline ? '#4caf84' : 'var(--text2)';
            } else {
                panelStatus.textContent = 'онлайн';
                panelStatus.style.color = '#4caf84';
            }
        }

        function checkOnline(username) {
            const presence = db.ref('presence').once('value').then(snap => {
                const data = snap.val() || {};
                return !!data[username];
            });
            // Используем синхронно? Нет, переделаем: будем хранить локальный кеш presence
            // Для простоты обновим при каждом событии presence
            return false;
        }
        // Более правильно: хранить локальный объект presenceData
        let presenceData = {};
        db.ref('presence').on('value', snap => {
            presenceData = snap.val() || {};
            updateOnlineStatuses();
            renderChatList(); // обновить список (можно только статусы)
        });

        function isUserOnline(username) {
            return !!presenceData[username];
        }

        // ============================================================
        // СООБЩЕНИЯ
        // ============================================================
        function getChatPath(chat) {
            if (chat === 'global') return 'messages/global';
            const ids = [currentUser.username, chat].sort();
            return `messages/private/${ids[0]}_${ids[1]}`;
        }

        function listenToChat(chat) {
            // Отписываемся от предыдущего слушателя
            if (chatListeners[chat]) {
                db.ref(getChatPath(chat)).off('value', chatListeners[chat]);
            }
            const callback = snap => {
                const msgs = [];
                const data = snap.val();
                if (data) {
                    for (let key in data) {
                        msgs.push({ id: key, ...data[key] });
                    }
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                }
                renderMessages(msgs);
                updateLastMessage(chat, msgs);
                // Уведомление о новом сообщении
                if (msgs.length > 0) {
                    const last = msgs[msgs.length - 1];
                    if (last.sender !== currentUser.username && !document.hasFocus()) {
                        showToast(`Новое от ${last.sender}: ${last.text || '🖼️'}`);
                        notify(last);
                    }
                }
            };
            db.ref(getChatPath(chat)).on('value', callback);
            chatListeners[chat] = callback;
        }

        function stopListening(chat) {
            if (chatListeners[chat]) {
                db.ref(getChatPath(chat)).off('value', chatListeners[chat]);
                delete chatListeners[chat];
            }
        }

        async function sendMessage(text, imageUrl = null) {
            if (!currentUser) return;
            const msg = {
                sender: currentUser.username,
                text: text || '',
                timestamp: firebase.database.ServerValue.TIMESTAMP,
            };
            if (imageUrl) msg.imageUrl = imageUrl;
            await db.ref(getChatPath(currentChat)).push(msg);
            messageInput.value = '';
        }

        async function deleteMessage(chat, msgId) {
            await db.ref(`${getChatPath(chat)}/${msgId}`).remove();
        }

        function renderMessages(msgs) {
            messagesArea.innerHTML = '';
            if (!msgs.length) {
                messagesArea.innerHTML = '<div style="color:var(--text2); text-align:center; margin-top:40px;">💬 Нет сообщений</div>';
                return;
            }
            msgs.forEach(msg => {
                const isSelf = msg.sender === currentUser.username;
                const div = document.createElement('div');
                div.className = 'msg ' + (isSelf ? 'self' : 'other');
                let content = escapeHtml(msg.text || '');
                if (msg.imageUrl) {
                    content += `<br><img src="${msg.imageUrl}" alt="gif" onclick="window.open('${msg.imageUrl}')">`;
                }
                div.innerHTML = content + `<span class="time">${formatTime(msg.timestamp)}</span>`;
                if (isSelf) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'del';
                    delBtn.textContent = '🗑';
                    delBtn.onclick = () => deleteMessage(currentChat, msg.id);
                    div.appendChild(delBtn);
                }
                messagesArea.appendChild(div);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function updateLastMessage(chat, msgs) {
            const last = msgs.length ? msgs[msgs.length - 1] : null;
            const preview = last ? (last.text ? last.text : '🖼️ Стикер') : 'Нет сообщений';
            const time = last ? formatTime(last.timestamp) : '';
            if (chat === 'global') {
                globalLastMsg.textContent = preview;
                globalTime.textContent = time;
            } else {
                const item = chatList.querySelector(`.chat-item[data-chat="${chat}"]`);
                if (item) {
                    item.querySelector('.last-msg').textContent = preview;
                    item.querySelector('.time').textContent = time;
                }
            }
        }

        // ============================================================
        // СТИКЕРЫ
        // ============================================================
        async function loadStickers() {
            const snap = await db.ref('catGifs').once('value');
            const data = snap.val();
            stickerCache = data ? Object.values(data) : [];
        }

        async function addStickerUrl(url) {
            if (!url.trim()) return;
            try { new URL(url); } catch { alert('Некорректный URL'); return; }
            await db.ref('catGifs').push(url);
            await loadStickers();
            renderStickers('saved');
        }

        // ============================================================
        // GIPHY
        // ============================================================
        async function searchGiphy(query) {
            if (!query.trim()) return [];
            const url = `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(query)}&limit=20&rating=g`;
            const res = await fetch(url);
            const data = await res.json();
            return (data.data || []).map(item => item.images.original.url);
        }

        // ============================================================
        // UI: список чатов
        // ============================================================
        function renderChatList() {
            const globalItem = chatList.querySelector('#chatGlobal');
            chatList.innerHTML = '';
            chatList.appendChild(globalItem);

            if (!currentUser) return;
            const contactNames = new Set();
            // Все пользователи из usersCache
            for (let uname in usersCache) {
                if (uname !== currentUser.username) contactNames.add(uname);
            }
            // Добавляем тех, с кем уже есть переписка (могут быть не в usersCache)
            // можно пропустить

            const sorted = Array.from(contactNames).sort();
            sorted.forEach(uname => {
                const user = usersCache[uname] || { name: uname, avatar: '' };
                const div = document.createElement('div');
                div.className = 'chat-item' + (currentChat === uname ? ' active' : '');
                div.dataset.chat = uname;
                const av = document.createElement('div');
                av.className = 'avatar';
                if (user.avatar) {
                    av.innerHTML = `<img src="${user.avatar}" onerror="this.style.display='none'; this.parentElement.textContent='${(user.name||'?').charAt(0).toUpperCase()}'">`;
                } else {
                    av.textContent = (user.name || uname).charAt(0).toUpperCase();
                }
                const info = document.createElement('div');
                info.className = 'info';
                info.innerHTML = `<div class="name">${user.name||uname}</div><div class="last-msg">Загрузка...</div>`;
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                div.appendChild(av);
                div.appendChild(info);
                div.appendChild(timeDiv);
                div.addEventListener('click', () => switchChat(uname));
                chatList.appendChild(div);
                // Подгружаем последнее сообщение один раз
                loadLastMessage(uname, info.querySelector('.last-msg'), timeDiv);
            });

            // Обновляем глобальный чат
            const gMsgs = db.ref('messages/global').once('value').then(snap => {
                const msgs = [];
                const data = snap.val();
                if (data) for (let k in data) msgs.push(data[k]);
                msgs.sort((a,b)=>a.timestamp-b.timestamp);
                updateLastMessage('global', msgs);
            });
        }

        async function loadLastMessage(chatName, lastMsgEl, timeEl) {
            const path = `messages/private/${[currentUser.username, chatName].sort().join('_')}`;
            const snap = await db.ref(path).limitToLast(1).once('value');
            const data = snap.val();
            if (data) {
                const msg = Object.values(data)[0];
                lastMsgEl.textContent = msg.text || '🖼️ Стикер';
                timeEl.textContent = formatTime(msg.timestamp);
            } else {
                lastMsgEl.textContent = 'Нет сообщений';
                timeEl.textContent = '';
            }
        }

        function switchChat(chat) {
            if (currentChat === chat) return;
            stopListening(currentChat);
            currentChat = chat;
            listenToChat(chat);
            updatePanelHeader(chat);
            renderChatList();
            closeSidebar();
            localStorage.setItem('chat_current', chat);
        }

        function updatePanelHeader(chat) {
            if (chat === 'global') {
                panelName.textContent = 'Глобальный чат';
                panelAvatar.innerHTML = '🌍';
                panelStatus.textContent = 'онлайн';
                panelStatus.style.color = '#4caf84';
            } else {
                const user = usersCache[chat] || { name: chat, avatar: '' };
                panelName.textContent = user.name || chat;
                const online = isUserOnline(chat);
                panelStatus.textContent = online ? 'онлайн' : 'офлайн';
                panelStatus.style.color = online ? '#4caf84' : 'var(--text2)';
                if (user.avatar) {
                    panelAvatar.innerHTML = `<img src="${user.avatar}" onerror="this.parentElement.textContent='${(user.name||'?').charAt(0).toUpperCase()}'">`;
                } else {
                    panelAvatar.textContent = (user.name || chat).charAt(0).toUpperCase();
                }
            }
        }

        // ============================================================
        // САЙДБАР (мобильный)
        // ============================================================
        function openSidebar() { sidebar.classList.add('open'); chatPanel.classList.add('shifted'); }
        function closeSidebar() { sidebar.classList.remove('open'); chatPanel.classList.remove('shifted'); }
        function toggleSidebar() { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); }

        // ============================================================
        // УВЕДОМЛЕНИЯ
        // ============================================================
        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
        }
        function notify(msg) {
            if (Notification.permission === 'default') Notification.requestPermission();
            if (Notification.permission === 'granted') {
                new Notification(`Новое сообщение от ${msg.sender}`, {
                    body: msg.text || '🖼️ Стикер',
                    icon: 'https://cdn-icons-png.flaticon.com/512/1044/1044342.png'
                });
            }
        }

        // ============================================================
        // РАЗМЕР ЭКРАНА
        // ============================================================
        function updateScreenSize() {
            const w = window.innerWidth, h = window.innerHeight;
            screenSizeDisplay.textContent = `📐 ${w}×${h}`;
            if (settingsScreenWidth) settingsScreenWidth.textContent = w;
            if (settingsScreenHeight) settingsScreenHeight.textContent = h;
        }
        screenSizeDisplay.addEventListener('click', () => {
            const size = `${window.innerWidth}×${window.innerHeight}`;
            navigator.clipboard?.writeText(size).then(() => showToast('Скопировано: ' + size)).catch(() => showToast('Не удалось скопировать'));
        });

        // ============================================================
        // ТЕМА
        // ============================================================
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('chat_theme', theme);
            themeDark.classList.toggle('active', theme === 'dark');
            themeLight.classList.toggle('active', theme === 'light');
        }

        // ============================================================
        // ВСПОМОГАТЕЛЬНЫЕ
        // ============================================================
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        async function loadUsersCache() {
            const snap = await db.ref('users').once('value');
            usersCache = snap.val() || {};
        }

        async function initApp() {
            await loadUsersCache();
            await loadStickers();
            setupPresence();
            listenPresence();

            // Слушаем глобальный чат по умолчанию
            currentChat = localStorage.getItem('chat_current') || 'global';
            if (currentChat !== 'global' && !usersCache[currentChat]) {
                currentChat = 'global';
            }
            listenToChat(currentChat);
            updatePanelHeader(currentChat);
            renderChatList();

            // Обработчики
            sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
            messageInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(messageInput.value); });
            stickerBtn.addEventListener('click', openStickerModal);
            closeStickerModal.addEventListener('click', () => stickerModal.classList.remove('open'));
            stickerModal.addEventListener('click', e => { if (e.target === stickerModal) stickerModal.classList.remove('open'); });

            menuBtn.addEventListener('click', toggleSidebar);
            chatGlobal.addEventListener('click', () => switchChat('global'));

            document.addEventListener('click', e => {
                if (window.innerWidth <= 700 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuBtn) {
                    closeSidebar();
                }
            });

            addContactBtn.addEventListener('click', () => addContactModal.classList.add('open'));
            closeModal.addEventListener('click', () => addContactModal.classList.remove('open'));
            confirmAddContact.addEventListener('click', addContact);
            contactInput.addEventListener('keydown', e => { if (e.key === 'Enter') addContact(); });

            settingsBtn.addEventListener('click', () => {
                settingsPanel.classList.add('open');
                avatarUrlInput.value = currentUser.avatar || '';
                updateScreenSize();
            });
            settingsBack.addEventListener('click', () => settingsPanel.classList.remove('open'));
            avatarUrlInput.addEventListener('change', async () => {
                await updateProfile({ avatar: avatarUrlInput.value.trim() });
                usersCache[currentUser.username].avatar = avatarUrlInput.value.trim();
                renderChatList();
                updatePanelHeader(currentChat);
            });
            themeDark.addEventListener('click', () => applyTheme('dark'));
            themeLight.addEventListener('click', () => applyTheme('light'));
            settingsLogout.addEventListener('click', logout);

            updateScreenSize();
            window.addEventListener('resize', updateScreenSize);
        }

        async function addContact() {
            const username = contactInput.value.trim();
            if (!username) return;
            if (username === currentUser.username) { alert('Это вы'); return; }
            const snap = await db.ref(`users/${username}`).once('value');
            if (!snap.exists()) { alert('Пользователь не найден'); return; }
            usersCache[username] = snap.val();
            addContactModal.classList.remove('open');
            switchChat(username);
            renderChatList();
        }

        function openStickerModal() {
            stickerModal.classList.add('open');
            stickerSearchInput.value = '';
            document.querySelector('.sticker-tabs button[data-tab="saved"]').classList.add('active');
            document.querySelector('.sticker-tabs button[data-tab="search"]').classList.remove('active');
            renderStickers('saved');
        }

        let currentStickerTab = 'saved';
        function renderStickers(tab) {
            currentStickerTab = tab;
            stickerGrid.innerHTML = '';
            if (tab === 'saved') {
                stickerCache.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    img.onerror = () => img.style.display = 'none';
                    img.addEventListener('click', () => {
                        sendMessage('', url);
                        stickerModal.classList.remove('open');
                    });
                    stickerGrid.appendChild(img);
                });
                const addDiv = document.createElement('div');
                addDiv.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:8px;padding:6px;cursor:pointer;';
                addDiv.innerHTML = '<span style="font-size:20px;">➕</span><span style="font-size:11px;color:var(--text2);">Добавить</span>';
                addDiv.addEventListener('click', () => {
                    const url = prompt('Введите URL картинки/гифки:');
                    if (url) addStickerUrl(url);
                });
                stickerGrid.appendChild(addDiv);
            } else {
                const query = stickerSearchInput.value.trim() || 'funny cat';
                searchGiphy(query).then(results => {
                    if (!results.length) {
                        stickerGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:20px;">Ничего не найдено</div>';
                        return;
                    }
                    results.forEach(url => {
                        const wrapper = document.createElement('div');
                        wrapper.style.position = 'relative';
                        const img = document.createElement('img');
                        img.src = url;
                        img.onerror = () => img.style.display = 'none';
                        img.addEventListener('click', () => {
                            sendMessage('', url);
                            stickerModal.classList.remove('open');
                        });
                        const saveBtn = document.createElement('button');
                        saveBtn.textContent = '💾';
                        saveBtn.style.cssText = 'position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;color:#fff;width:26px;height:26px;cursor:pointer;font-size:13px;';
                        saveBtn.addEventListener('click', e => {
                            e.stopPropagation();
                            addStickerUrl(url);
                        });
                        wrapper.appendChild(img);
                        wrapper.appendChild(saveBtn);
                        stickerGrid.appendChild(wrapper);
                    });
                });
            }
        }
        stickerTabs.forEach(btn => {
            btn.addEventListener('click', () => {
                stickerTabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderStickers(btn.dataset.tab);
            });
        });
        stickerSearchInput.addEventListener('input', () => {
            if (currentStickerTab === 'search') renderStickers('search');
        });

        async function logout() {
            if (currentUser) {
                db.ref(`presence/${currentUser.username}`).remove();
                await db.ref(`users/${currentUser.username}`).update({ status: 'offline', lastSeen: Date.now() });
            }
            localStorage.removeItem('chat_user');
            localStorage.removeItem('chat_pass');
            currentUser = null;
            chatApp.style.display = 'none';
            loginScreen.style.display = 'flex';
            settingsPanel.classList.remove('open');
            // Отписываемся от всех слушателей
            Object.keys(chatListeners).forEach(chat => stopListening(chat));
        }

        // ============================================================
        // АВТОРИЗАЦИЯ
        // ============================================================
        async function doLogin(username, password, remember) {
            try {
                if (isLogin) {
                    currentUser = await loginUser(username, password);
                } else {
                    currentUser = await registerUser(username, password);
                }
                loginScreen.style.display = 'none';
                chatApp.style.display = 'flex';
                if (remember) {
                    localStorage.setItem('chat_user', username);
                    localStorage.setItem('chat_pass', password);
                } else {
                    localStorage.removeItem('chat_user');
                    localStorage.removeItem('chat_pass');
                }
                await initApp();
            } catch (err) {
                loginError.textContent = err.message;
            }
        }

        loginBtn.addEventListener('click', () => {
            const u = loginInput.value.trim(), p = passInput.value.trim();
            if (!u || !p) { loginError.textContent = 'Заполните все поля'; return; }
            loginError.textContent = '';
            doLogin(u, p, rememberCheck.checked);
        });
        toggleLogin.addEventListener('click', () => {
            isLogin = !isLogin;
            loginBtn.textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
            toggleLogin.textContent = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            loginError.textContent = '';
        });

        // Автовход
        (async function() {
            const savedTheme = localStorage.getItem('chat_theme') || 'dark';
            applyTheme(savedTheme);
            const savedUser = localStorage.getItem('chat_user');
            const savedPass = localStorage.getItem('chat_pass');
            if (savedUser && savedPass) {
                loginInput.value = savedUser;
                passInput.value = savedPass;
                rememberCheck.checked = true;
                try {
                    await doLogin(savedUser, savedPass, true);
                } catch {
                    loginScreen.style.display = 'flex';
                }
            } else {
                loginScreen.style.display = 'flex';
            }
        })();
    </script>
</body>
</html>
