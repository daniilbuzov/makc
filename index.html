<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат со стикерами</title>
    <style>
        /* ===== ПЕРЕМЕННЫЕ ТЕМЫ ===== */
        :root {
            --bg: #0e0e0e;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --bg-hover: #2b2b2b;
            --bg-input: #242424;
            --bg-msg-self: #2a6fdb;
            --bg-msg-other: #242424;
            --text: #e4e4e4;
            --text2: #888;
            --border: #2b2b2b;
            --avatar-bg: #2a6fdb;
            --shadow: rgba(0,0,0,0.5);
        }
        [data-theme="light"] {
            --bg: #ffffff;
            --bg2: #f0f2f5;
            --bg3: #e4e6eb;
            --bg-hover: #d1d5db;
            --bg-input: #f0f2f5;
            --bg-msg-self: #0084ff;
            --bg-msg-other: #e4e6eb;
            --text: #050505;
            --text2: #65676b;
            --border: #ced0d4;
            --avatar-bg: #0084ff;
            --shadow: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background .2s; }

        /* ===== ВХОД ===== */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 14px; padding: 20px; background: var(--bg); }
        #loginScreen h1 { font-size: 32px; color: var(--text); }
        #loginScreen input { width: 300px; max-width: 90%; padding: 14px 18px; border-radius: 40px; border: none; background: var(--bg-input); color: var(--text); font-size: 16px; outline: none; }
        #loginScreen .btn { width: 300px; max-width: 90%; padding: 14px; border: none; border-radius: 40px; background: var(--avatar-bg); color: #fff; font-weight: 600; font-size: 16px; cursor: pointer; }
        #loginScreen .toggle-link { color: var(--text2); cursor: pointer; font-size: 14px; text-decoration: underline; margin-top: 4px; }
        #loginScreen .error { color: #e74c3c; font-size: 14px; min-height: 20px; }
        #loginScreen .remember { display: flex; align-items: center; gap: 8px; color: var(--text2); font-size: 14px; }
        #loginScreen .remember input { width: auto; }

        /* ===== ЧАТ ===== */
        #chatApp { display: none; height: 100vh; background: var(--bg); flex-direction: column; }
        .top-bar { display: flex; align-items: center; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
        .top-bar .menu-btn { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; display: none; }
        .top-bar .title { flex: 1; font-weight: 600; font-size: 18px; }
        .top-bar .settings-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }

        .app-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform .25s; overflow: hidden; }
        .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 18px; }
        .sidebar-header .add-btn { background: none; border: none; color: var(--avatar-bg); font-size: 24px; cursor: pointer; }
        .chat-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; }
        .chat-item:hover { background: var(--bg-hover); }
        .chat-item.active { background: var(--bg-hover); border-left-color: var(--avatar-bg); }
        .chat-item .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; color: #fff; flex-shrink: 0; overflow: hidden; }
        .chat-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-item .info { flex: 1; overflow: hidden; }
        .chat-item .info .name { font-weight: 500; font-size: 15px; }
        .chat-item .info .last-msg { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .time { font-size: 12px; color: var(--text2); flex-shrink: 0; }

        .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; }
        .chat-panel-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg2); flex-shrink: 0; }
        .chat-panel-header .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; flex-shrink: 0; overflow: hidden; }
        .chat-panel-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-panel-header .name { font-weight: 500; font-size: 16px; }
        .chat-panel-header .status { font-size: 13px; color: var(--text2); }

        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; background: var(--bg); }
        .msg { max-width: 75%; padding: 8px 14px; border-radius: 16px; line-height: 1.4; font-size: 14px; word-wrap: break-word; position: relative; }
        .msg.self { align-self: flex-end; background: var(--bg-msg-self); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--bg-msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .msg .time { font-size: 11px; opacity: 0.6; margin-top: 4px; display: block; }
        .msg .del { background: none; border: none; color: #f87171; cursor: pointer; font-size: 12px; margin-left: 8px; opacity: 0.5; }
        .msg .del:hover { opacity: 1; }
        .msg img { max-width: 200px; max-height: 150px; border-radius: 10px; margin-top: 4px; display: block; }

        /* ===== НИЖНЯЯ ПАНЕЛЬ (исправлена для мобильных) ===== */
        .input-area {
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            background: var(--bg2);
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: nowrap; /* запрещаем перенос */
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: none;
            background: var(--bg-input);
            color: var(--text);
            font-size: 15px;
            outline: none;
            min-width: 0; /* разрешаем сжиматься */
            width: 100%;
        }
        .input-area .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: var(--avatar-bg);
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .input-area .btn-cat {
            background: #f59e0b;
        }
        .input-area .btn-cat:hover { background: #d97706; }

        /* Скрываем форму добавления стикера из основной строки – она будет в модалке */
        .input-area .add-form {
            display: none;
        }

        /* ===== МОДАЛКА СТИКЕРОВ ===== */
        .sticker-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 2000; }
        .sticker-modal.open { display: flex; }
        .sticker-modal-content { background: var(--bg2); border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; padding: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .sticker-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .sticker-modal-header input { flex: 1; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 14px; outline: none; margin-right: 8px; }
        .sticker-modal-header .close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
        .sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; overflow-y: auto; padding: 8px 0; flex: 1; }
        .sticker-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.15s; border: 2px solid transparent; }
        .sticker-grid img:hover { border-color: var(--avatar-bg); transform: scale(1.02); }
        .sticker-tabs { display: flex; gap: 8px; margin-bottom: 8px; }
        .sticker-tabs button { padding: 6px 12px; border: none; border-radius: 20px; background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px; }
        .sticker-tabs button.active { background: var(--avatar-bg); color: #fff; }

        /* ===== МОДАЛКА КОНТАКТА ===== */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg2); padding: 24px; border-radius: 16px; width: 320px; max-width: 90%; }
        .modal h3 { margin-bottom: 12px; }
        .modal input { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 16px; outline: none; margin-bottom: 12px; }
        .modal .btn { width: 100%; padding: 12px; border: none; border-radius: 20px; background: var(--avatar-bg); color: #fff; font-weight: 600; cursor: pointer; }
        .modal .btn-close { background: transparent; color: var(--text2); margin-top: 8px; }

        /* ===== НАСТРОЙКИ ===== */
        .settings-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 999; padding: 20px; flex-direction: column; gap: 16px; overflow-y: auto; }
        .settings-panel.open { display: flex; }
        .settings-panel .back { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; align-self: flex-start; }
        .settings-panel label { font-weight: 500; }
        .settings-panel input { padding: 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 14px; outline: none; }
        .settings-panel .theme-toggle { display: flex; gap: 12px; margin: 8px 0; }
        .settings-panel .theme-toggle button { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 20px; background: transparent; color: var(--text); cursor: pointer; font-weight: 500; }
        .settings-panel .theme-toggle button.active { border-color: var(--avatar-bg); background: var(--bg-hover); }
        .settings-panel .logout-btn { background: #e74c3c; color: #fff; border: none; padding: 12px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 700px) {
            .top-bar .menu-btn { display: block; }
            .sidebar { position: fixed; top: 56px; left: 0; bottom: 0; width: 280px; transform: translateX(-100%); z-index: 100; background: var(--bg2); border-right: 1px solid var(--border); }
            .sidebar.open { transform: translateX(0); }
            .chat-panel { width: 100%; }
            .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            /* Уменьшаем отступы и размеры на телефоне */
            .input-area { padding: 6px 10px; gap: 4px; }
            .input-area input[type="text"] { font-size: 14px; padding: 8px 12px; }
            .input-area .btn { padding: 6px 12px; font-size: 13px; }
        }
        @media (min-width: 701px) {
            .sidebar { position: relative; transform: none !important; }
        }

        /* Стили для уведомлений (всплывающие) */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg2);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 40px;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 3000;
            display: none;
            font-size: 14px;
            border: 1px solid var(--border);
        }
        .toast-container.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="loginScreen">
        <h1>📱 Чат</h1>
        <div id="loginError" class="error"></div>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passInput" placeholder="Пароль">
        <div class="remember">
            <input type="checkbox" id="rememberCheck" checked> <label for="rememberCheck">Запомнить меня</label>
        </div>
        <button class="btn" id="loginBtn">Войти</button>
        <span class="toggle-link" id="toggleLogin">Нет аккаунта? Зарегистрироваться</span>
    </div>

    <!-- ЧАТ -->
    <div id="chatApp">
        <div class="top-bar">
            <button class="menu-btn" id="menuBtn">☰</button>
            <span class="title" id="topTitle">Чаты</span>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        <div class="app-layout">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>Чаты</h2>
                    <button class="add-btn" id="addContactBtn">➕</button>
                </div>
                <div class="chat-list" id="chatList">
                    <div class="chat-item active" data-chat="global" id="chatGlobal">
                        <div class="avatar">🌍</div>
                        <div class="info">
                            <div class="name">Глобальный чат</div>
                            <div class="last-msg" id="globalLastMsg">Добро пожаловать!</div>
                        </div>
                        <div class="time" id="globalTime"></div>
                    </div>
                </div>
            </div>
            <div class="chat-panel" id="chatPanel">
                <div class="chat-panel-header">
                    <div class="avatar" id="panelAvatar">🌍</div>
                    <div>
                        <div class="name" id="panelName">Глобальный чат</div>
                        <div class="status" id="panelStatus">онлайн</div>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea">
                    <div style="color:var(--text2); text-align:center; margin-top:40px;">💬 Начните общение</div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." maxlength="500">
                    <button class="btn btn-cat" id="catBtn">🐱</button>
                    <button class="btn" id="sendBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ДОБАВЛЕНИЯ КОНТАКТА -->
    <div class="modal-overlay" id="addContactModal">
        <div class="modal">
            <h3>Добавить контакт</h3>
            <input type="text" id="contactInput" placeholder="Введите ник пользователя">
            <button class="btn" id="confirmAddContact">Добавить</button>
            <button class="btn btn-close" id="closeModal">Отмена</button>
        </div>
    </div>

    <!-- МОДАЛКА СТИКЕРОВ -->
    <div class="sticker-modal" id="stickerModal">
        <div class="sticker-modal-content">
            <div class="sticker-modal-header">
                <input type="text" id="stickerSearchInput" placeholder="Поиск гифок...">
                <button class="close" id="closeStickerModal">✕</button>
            </div>
            <div class="sticker-tabs">
                <button class="active" data-tab="saved">📁 Мои</button>
                <button data-tab="search">🔍 Поиск</button>
            </div>
            <div class="sticker-grid" id="stickerGrid">
                <!-- сюда будут загружаться гифки -->
            </div>
        </div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div class="settings-panel" id="settingsPanel">
        <button class="back" id="settingsBack">← Назад</button>
        <h2>Настройки</h2>
        <label>Аватар (URL)</label>
        <input type="text" id="avatarUrlInput" placeholder="https://example.com/avatar.jpg">
        <label>Тема</label>
        <div class="theme-toggle">
            <button data-theme="dark" id="themeDark">🌙 Тёмная</button>
            <button data-theme="light" id="themeLight">☀️ Светлая</button>
        </div>
        <button class="logout-btn" id="settingsLogout">Выйти</button>
    </div>

    <!-- Всплывающее уведомление -->
    <div class="toast-container" id="toast"></div>

    <script>
        // ============================================================
        // КОНФИГ
        // ============================================================
        const DB_URL = 'https://makc-894d6-default-rtdb.firebaseio.com/';
        const GIPHY_API_KEY = 'd6yTgfwrs03OJkuyfjfPiPmNp4fUDbEY';
        const DEFAULT_STICKERS = []; // пусто

        let currentUser = null;
        let currentChat = 'global';
        let messages = {};
        let users = {};
        let stickerList = [];
        let pollInterval = null;
        let isLogin = true;

        // Для уведомлений
        let lastNotifiedMsgId = null;
        let isChatFocused = true;

        // DOM
        const $ = id => document.getElementById(id);
        const loginScreen = $('loginScreen');
        const chatApp = $('chatApp');
        const loginError = $('loginError');
        const loginInput = $('loginInput');
        const passInput = $('passInput');
        const rememberCheck = $('rememberCheck');
        const loginBtn = $('loginBtn');
        const toggleLogin = $('toggleLogin');
        const menuBtn = $('menuBtn');
        const settingsBtn = $('settingsBtn');
        const settingsPanel = $('settingsPanel');
        const settingsBack = $('settingsBack');
        const avatarUrlInput = $('avatarUrlInput');
        const themeDark = $('themeDark');
        const themeLight = $('themeLight');
        const settingsLogout = $('settingsLogout');
        const addContactBtn = $('addContactBtn');
        const addContactModal = $('addContactModal');
        const contactInput = $('contactInput');
        const confirmAddContact = $('confirmAddContact');
        const closeModal = $('closeModal');
        const chatList = $('chatList');
        const chatGlobal = $('chatGlobal');
        const globalLastMsg = $('globalLastMsg');
        const globalTime = $('globalTime');
        const panelAvatar = $('panelAvatar');
        const panelName = $('panelName');
        const panelStatus = $('panelStatus');
        const messagesArea = $('messagesArea');
        const messageInput = $('messageInput');
        const sendBtn = $('sendBtn');
        const catBtn = $('catBtn');
        const sidebar = $('sidebar');
        const stickerModal = $('stickerModal');
        const stickerSearchInput = $('stickerSearchInput');
        const stickerGrid = $('stickerGrid');
        const closeStickerModal = $('closeStickerModal');
        const stickerTabs = document.querySelectorAll('.sticker-tabs button');
        const toast = $('toast');

        // ============================================================
        // РАБОТА С БАЗОЙ (REST)
        // ============================================================
        async function dbGet(path) {
            const r = await fetch(DB_URL + path + '.json');
            if (!r.ok) throw new Error('DB error');
            return r.json();
        }
        async function dbPut(path, data) {
            const r = await fetch(DB_URL + path + '.json', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            if (!r.ok) throw new Error('DB error');
            return r.json();
        }
        async function dbPatch(path, data) {
            const r = await fetch(DB_URL + path + '.json', { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            if (!r.ok) throw new Error('DB error');
            return r.json();
        }
        async function dbDelete(path) {
            const r = await fetch(DB_URL + path + '.json', { method:'DELETE' });
            if (!r.ok) throw new Error('DB error');
            return r.json();
        }
        async function dbPush(path, data) {
            const r = await fetch(DB_URL + path + '.json', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            if (!r.ok) throw new Error('DB error');
            return r.json();
        }

        // ============================================================
        // АУТЕНТИФИКАЦИЯ
        // ============================================================
        async function registerUser(username, password) {
            const all = await dbGet('users');
            if (all && all[username]) throw new Error('Пользователь уже существует');
            await dbPut(`users/${username}`, { password, name: username, status: 'online', lastSeen: Date.now(), avatar: '' });
            return { username, password, name: username, avatar: '' };
        }
        async function loginUser(username, password) {
            const user = await dbGet(`users/${username}`);
            if (!user || user.password !== password) throw new Error('Неверный логин или пароль');
            await dbPatch(`users/${username}`, { status: 'online', lastSeen: Date.now() });
            return { username, ...user };
        }
        async function logoutUser() {
            if (currentUser) {
                await dbPatch(`users/${currentUser.username}`, { status: 'offline', lastSeen: Date.now() });
            }
            localStorage.removeItem('chat_user');
            localStorage.removeItem('chat_pass');
            localStorage.removeItem('chat_theme');
        }

        // ============================================================
        // СТИКЕРЫ
        // ============================================================
        async function loadStickers() {
            const data = await dbGet('catGifs');
            if (data) {
                stickerList = Object.values(data);
            } else {
                await dbPut('catGifs', {});
                stickerList = [];
            }
        }
        async function addSticker(url) {
            if (!url.trim()) return;
            try { new URL(url); } catch { alert('Некорректный URL'); return; }
            await dbPush('catGifs', url);
            await loadStickers();
            alert('Стикер добавлен!');
        }

        // ============================================================
        // ПОИСК GIPHY
        // ============================================================
        async function searchGiphy(query) {
            if (!query.trim()) return [];
            const url = `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(query)}&limit=20&rating=g`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.data && data.data.length) {
                    return data.data.map(item => item.images.original.url);
                }
                return [];
            } catch (err) {
                console.error('GIPHY error:', err);
                return [];
            }
        }

        // ============================================================
        // ПОЛЬЗОВАТЕЛИ
        // ============================================================
        async function loadUsers() {
            const data = await dbGet('users');
            users = data || {};
            renderChatList();
        }
        function getChatId(u1, u2) {
            return [u1, u2].sort().join('_');
        }

        // ============================================================
        // СООБЩЕНИЯ
        // ============================================================
        async function loadMessages(chat) {
            let path = chat === 'global' ? 'messages/global' : `messages/private/${getChatId(currentUser.username, chat)}`;
            const data = await dbGet(path);
            const msgs = [];
            if (data) {
                for (let key in data) {
                    msgs.push({ ...data[key], id: key });
                }
                msgs.sort((a,b) => a.timestamp - b.timestamp);
            }
            messages[chat] = msgs;
            return msgs;
        }

        function renderMessages(msgs) {
            messagesArea.innerHTML = '';
            if (!msgs || msgs.length === 0) {
                messagesArea.innerHTML = '<div style="color:var(--text2); text-align:center; margin-top:40px;">💬 Нет сообщений</div>';
                return;
            }
            msgs.forEach(msg => {
                const isSelf = msg.sender === currentUser.username;
                const div = document.createElement('div');
                div.className = 'msg ' + (isSelf ? 'self' : 'other');
                let content = '';
                if (msg.text) content += escapeHtml(msg.text);
                if (msg.imageUrl) {
                    content += `<br><img src="${msg.imageUrl}" alt="стикер" onerror="this.style.display='none'">`;
                }
                let del = '';
                if (isSelf) {
                    del = `<button class="del" data-chat="${currentChat}" data-id="${msg.id}">🗑</button>`;
                }
                div.innerHTML = content + `<span class="time">${timeStr(msg.timestamp)}</span>` + del;
                messagesArea.appendChild(div);
            });
            // Удаление
            messagesArea.querySelectorAll('.del').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const chat = btn.dataset.chat;
                    const id = btn.dataset.id;
                    if (!confirm('Удалить?')) return;
                    let path = chat === 'global' ? 'messages/global' : `messages/private/${getChatId(currentUser.username, chat)}`;
                    await dbDelete(`${path}/${id}`);
                    await refreshCurrentChat();
                });
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function refreshCurrentChat() {
            if (!currentUser) return;
            const msgs = await loadMessages(currentChat);
            renderMessages(msgs);
            updateChatLastMsg(currentChat, msgs);
            // Проверяем новые сообщения для уведомлений
            if (msgs.length > 0) {
                const lastMsg = msgs[msgs.length-1];
                if (lastMsg.id !== lastNotifiedMsgId && !isChatFocused && lastMsg.sender !== currentUser.username) {
                    showToast(`Новое сообщение от ${lastMsg.sender}: ${lastMsg.text || '🖼️ Стикер'}`);
                    lastNotifiedMsgId = lastMsg.id;
                    // запросить разрешение на уведомления
                    if (Notification.permission === 'default') {
                        Notification.requestPermission();
                    }
                    if (Notification.permission === 'granted') {
                        new Notification('Новое сообщение', {
                            body: `${lastMsg.sender}: ${lastMsg.text || '🖼️ Стикер'}`,
                            icon: 'https://cdn-icons-png.flaticon.com/512/1044/1044342.png'
                        });
                    }
                }
            }
        }

        function updateChatLastMsg(chat, msgs) {
            const last = msgs && msgs.length ? msgs[msgs.length-1] : null;
            const preview = last ? (last.text ? last.text : '🖼️ Стикер') : 'Нет сообщений';
            const time = last ? timeStr(last.timestamp) : '';
            if (chat === 'global') {
                globalLastMsg.textContent = preview;
                globalTime.textContent = time;
            } else {
                const item = chatList.querySelector(`.chat-item[data-chat="${chat}"]`);
                if (item) {
                    item.querySelector('.last-msg').textContent = preview;
                    item.querySelector('.time').textContent = time;
                }
            }
        }

        // ============================================================
        // ОТПРАВКА
        // ============================================================
        async function sendMessage(text, imageUrl = null) {
            if (!text && !imageUrl) return;
            const msg = { sender: currentUser.username, text: text || '', timestamp: Date.now() };
            if (imageUrl) msg.imageUrl = imageUrl;
            let path = currentChat === 'global' ? 'messages/global' : `messages/private/${getChatId(currentUser.username, currentChat)}`;
            await dbPush(path, msg);
            messageInput.value = '';
            await refreshCurrentChat();
            renderChatList();
        }

        // ============================================================
        // ОТРИСОВКА СПИСКА ЧАТОВ
        // ============================================================
        function renderChatList() {
            const globalItem = chatList.querySelector('#chatGlobal');
            chatList.innerHTML = '';
            chatList.appendChild(globalItem);

            const chatNames = new Set();
            for (let uname in users) {
                if (uname !== currentUser.username) chatNames.add(uname);
            }
            for (let key in messages) {
                if (key !== 'global') chatNames.add(key);
            }

            const sorted = Array.from(chatNames).sort();

            sorted.forEach(uname => {
                const user = users[uname] || { name: uname, avatar: '' };
                const div = document.createElement('div');
                div.className = 'chat-item' + (currentChat === uname ? ' active' : '');
                div.dataset.chat = uname;
                const av = document.createElement('div');
                av.className = 'avatar';
                if (user.avatar) {
                    const img = document.createElement('img');
                    img.src = user.avatar;
                    img.alt = '';
                    img.onerror = () => { img.style.display = 'none'; av.textContent = (user.name || '?').charAt(0).toUpperCase(); };
                    av.appendChild(img);
                } else {
                    av.textContent = (user.name || '?').charAt(0).toUpperCase();
                }
                const info = document.createElement('div');
                info.className = 'info';
                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = user.name || uname;
                const lastMsg = document.createElement('div');
                lastMsg.className = 'last-msg';
                const msgs = messages[uname] || [];
                const last = msgs.length ? msgs[msgs.length-1] : null;
                lastMsg.textContent = last ? (last.text ? last.text : '🖼️ Стикер') : 'Нет сообщений';
                info.appendChild(name);
                info.appendChild(lastMsg);
                const time = document.createElement('div');
                time.className = 'time';
                time.textContent = last ? timeStr(last.timestamp) : '';
                div.appendChild(av);
                div.appendChild(info);
                div.appendChild(time);
                div.addEventListener('click', () => {
                    if (currentChat === uname) return;
                    currentChat = uname;
                    refreshCurrentChat();
                    renderChatList();
                    updatePanelHeader(uname);
                    if (window.innerWidth <= 700) sidebar.classList.remove('open');
                });
                chatList.appendChild(div);
            });

            chatList.querySelectorAll('.chat-item').forEach(el => {
                el.classList.toggle('active', el.dataset.chat === currentChat);
            });
            const gmsgs = messages['global'] || [];
            const lastG = gmsgs.length ? gmsgs[gmsgs.length-1] : null;
            globalLastMsg.textContent = lastG ? (lastG.text ? lastG.text : '🖼️ Стикер') : 'Нет сообщений';
            globalTime.textContent = lastG ? timeStr(lastG.timestamp) : '';
        }

        function updatePanelHeader(chat) {
            if (chat === 'global') {
                panelName.textContent = 'Глобальный чат';
                panelAvatar.innerHTML = '🌍';
                panelStatus.textContent = 'онлайн';
            } else {
                const user = users[chat] || { name: chat, avatar: '' };
                panelName.textContent = user.name || chat;
                panelStatus.textContent = (user.status === 'online') ? 'онлайн' : 'офлайн';
                if (user.avatar) {
                    panelAvatar.innerHTML = `<img src="${user.avatar}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${(user.name||'?').charAt(0).toUpperCase()}'">`;
                } else {
                    panelAvatar.textContent = (user.name || '?').charAt(0).toUpperCase();
                }
            }
        }

        // ============================================================
        // ДОБАВЛЕНИЕ КОНТАКТА
        // ============================================================
        function openAddContact() {
            addContactModal.classList.add('open');
            contactInput.value = '';
            contactInput.focus();
        }
        async function addContact() {
            const username = contactInput.value.trim();
            if (!username) { alert('Введите ник'); return; }
            if (username === currentUser.username) { alert('Это вы'); return; }
            const userData = await dbGet(`users/${username}`);
            if (!userData) {
                alert('Пользователь не найден');
                return;
            }
            addContactModal.classList.remove('open');
            await loadMessages(username);
            currentChat = username;
            refreshCurrentChat();
            renderChatList();
            updatePanelHeader(username);
            if (window.innerWidth <= 700) sidebar.classList.remove('open');
        }

        // ============================================================
        // СТИКЕРЫ (модалка)
        // ============================================================
        let stickerTab = 'saved';

        function openStickerModal() {
            stickerModal.classList.add('open');
            stickerSearchInput.value = '';
            stickerTab = 'saved';
            updateStickerTabs();
            renderStickers('saved');
        }

        function closeStickerModalFn() {
            stickerModal.classList.remove('open');
        }

        function updateStickerTabs() {
            stickerTabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === stickerTab));
        }

        async function renderStickers(tab) {
            stickerGrid.innerHTML = '';
            if (tab === 'saved') {
                if (stickerList.length === 0) {
                    stickerGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text2); padding:20px;">Нет сохранённых стикеров. Добавьте свой URL или найдите в поиске и сохраните.</div>';
                } else {
                    stickerList.forEach(url => {
                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = 'стикер';
                        img.onerror = () => img.style.display = 'none';
                        img.addEventListener('click', () => {
                            sendMessage('', url);
                            closeStickerModalFn();
                        });
                        stickerGrid.appendChild(img);
                    });
                }
                const addDiv = document.createElement('div');
                addDiv.style.cssText = 'display:flex; flex-direction:column; gap:4px; align-items:center; justify-content:center; border:2px dashed var(--border); border-radius:10px; padding:8px; cursor:pointer;';
                addDiv.innerHTML = `<span style="font-size:24px;">➕</span><span style="font-size:12px; color:var(--text2);">Добавить</span>`;
                addDiv.addEventListener('click', () => {
                    const url = prompt('Введите URL картинки/гифки:');
                    if (url) addSticker(url);
                });
                stickerGrid.appendChild(addDiv);
            } else {
                const query = stickerSearchInput.value.trim() || 'funny cat';
                const results = await searchGiphy(query);
                if (results.length === 0) {
                    stickerGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text2); padding:20px;">Ничего не найдено. Попробуйте другой запрос.</div>';
                    return;
                }
                results.forEach(url => {
                    const wrapper = document.createElement('div');
                    wrapper.style.position = 'relative';
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = 'gif';
                    img.onerror = () => img.style.display = 'none';
                    img.addEventListener('click', () => {
                        sendMessage('', url);
                        closeStickerModalFn();
                    });
                    const saveBtn = document.createElement('button');
                    saveBtn.textContent = '💾';
                    saveBtn.style.cssText = 'position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.6); border:none; border-radius:50%; color:#fff; width:28px; height:28px; cursor:pointer; font-size:14px;';
                    saveBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        await addSticker(url);
                        alert('Стикер сохранён!');
                    });
                    wrapper.appendChild(img);
                    wrapper.appendChild(saveBtn);
                    stickerGrid.appendChild(wrapper);
                });
            }
        }

        stickerTabs.forEach(btn => {
            btn.addEventListener('click', () => {
                stickerTab = btn.dataset.tab;
                updateStickerTabs();
                renderStickers(stickerTab);
            });
        });

        stickerSearchInput.addEventListener('input', () => {
            if (stickerTab === 'search') renderStickers('search');
        });

        // ============================================================
        // УВЕДОМЛЕНИЯ (тосты)
        // ============================================================
        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        // ============================================================
        // НАСТРОЙКИ
        // ============================================================
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('chat_theme', theme);
            document.querySelectorAll('.theme-toggle button').forEach(b => b.classList.remove('active'));
            if (theme === 'dark') themeDark.classList.add('active');
            else themeLight.classList.add('active');
        }

        async function updateAvatar(url) {
            if (!currentUser) return;
            await dbPatch(`users/${currentUser.username}`, { avatar: url });
            currentUser.avatar = url;
            renderChatList();
            updatePanelHeader(currentChat);
        }

        // ============================================================
        // ВСПОМОГАТЕЛЬНЫЕ
        // ============================================================
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
        function timeStr(ts) {
            return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ============================================================
        // ПОЛЛИНГ
        // ============================================================
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if (!currentUser) return;
                await loadUsers();
                await loadStickers();
                await refreshCurrentChat();
                renderChatList();
                await dbPatch(`users/${currentUser.username}`, { status: 'online', lastSeen: Date.now() });
            }, 3000);
        }

        // ============================================================
        // ФОКУС ОКНА (для уведомлений)
        // ============================================================
        document.addEventListener('visibilitychange', () => {
            isChatFocused = document.visibilityState === 'visible';
            if (isChatFocused) {
                // при возвращении в чат сбрасываем уведомления
                lastNotifiedMsgId = null;
                toast.classList.remove('show');
            }
        });

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        async function initApp() {
            await loadUsers();
            await loadStickers();
            await loadMessages('global');
            const savedChat = localStorage.getItem('chat_current');
            if (savedChat && savedChat !== 'global' && users[savedChat]) {
                currentChat = savedChat;
                await loadMessages(savedChat);
            } else {
                currentChat = 'global';
            }
            refreshCurrentChat();
            renderChatList();
            updatePanelHeader(currentChat);
            startPolling();

            // Обработчики
            sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
            messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(messageInput.value); });
            catBtn.addEventListener('click', openStickerModal);
            closeStickerModal.addEventListener('click', closeStickerModalFn);
            stickerModal.addEventListener('click', (e) => {
                if (e.target === stickerModal) closeStickerModalFn();
            });

            chatGlobal.addEventListener('click', () => {
                if (currentChat === 'global') return;
                currentChat = 'global';
                refreshCurrentChat();
                renderChatList();
                updatePanelHeader('global');
                if (window.innerWidth <= 700) sidebar.classList.remove('open');
                localStorage.setItem('chat_current', 'global');
            });

            menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 700 && sidebar.classList.contains('open')) {
                    if (!sidebar.contains(e.target) && e.target !== menuBtn) {
                        sidebar.classList.remove('open');
                    }
                }
            });

            addContactBtn.addEventListener('click', openAddContact);
            confirmAddContact.addEventListener('click', addContact);
            closeModal.addEventListener('click', () => addContactModal.classList.remove('open'));
            contactInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addContact(); });

            settingsBtn.addEventListener('click', () => {
                settingsPanel.classList.add('open');
                avatarUrlInput.value = currentUser.avatar || '';
            });
            settingsBack.addEventListener('click', () => settingsPanel.classList.remove('open'));
            avatarUrlInput.addEventListener('change', async () => {
                await updateAvatar(avatarUrlInput.value);
            });
            themeDark.addEventListener('click', () => applyTheme('dark'));
            themeLight.addEventListener('click', () => applyTheme('light'));
            settingsLogout.addEventListener('click', async () => {
                await logoutUser();
                clearInterval(pollInterval);
                currentUser = null;
                chatApp.style.display = 'none';
                loginScreen.style.display = 'flex';
                loginInput.value = '';
                passInput.value = '';
                loginError.textContent = '';
            });

            if (currentChat !== 'global') localStorage.setItem('chat_current', currentChat);
            else localStorage.removeItem('chat_current');
        }

        // ============================================================
        // АВТОРИЗАЦИЯ
        // ============================================================
        async function doLogin(username, password, remember) {
            try {
                if (isLogin) {
                    currentUser = await loginUser(username, password);
                } else {
                    currentUser = await registerUser(username, password);
                }
                loginScreen.style.display = 'none';
                chatApp.style.display = 'flex';
                if (remember) {
                    localStorage.setItem('chat_user', username);
                    localStorage.setItem('chat_pass', password);
                } else {
                    localStorage.removeItem('chat_user');
                    localStorage.removeItem('chat_pass');
                }
                await initApp();
            } catch (err) {
                loginError.textContent = err.message;
                throw err;
            }
        }

        async function autoLogin() {
            const savedUser = localStorage.getItem('chat_user');
            const savedPass = localStorage.getItem('chat_pass');
            if (savedUser && savedPass) {
                loginInput.value = savedUser;
                passInput.value = savedPass;
                rememberCheck.checked = true;
                try {
                    await doLogin(savedUser, savedPass, true);
                    return true;
                } catch { return false; }
            }
            return false;
        }

        loginBtn.addEventListener('click', async () => {
            const u = loginInput.value.trim();
            const p = passInput.value.trim();
            if (!u || !p) { loginError.textContent = 'Заполните все поля'; return; }
            loginError.textContent = '';
            await doLogin(u, p, rememberCheck.checked);
        });
        toggleLogin.addEventListener('click', () => {
            isLogin = !isLogin;
            loginBtn.textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
            toggleLogin.textContent = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            loginError.textContent = '';
        });

        // ============================================================
        // ЗАПУСК
        // ============================================================
        (async function() {
            const savedTheme = localStorage.getItem('chat_theme') || 'dark';
            applyTheme(savedTheme);
            const logged = await autoLogin();
            if (!logged) {
                loginScreen.style.display = 'flex';
                chatApp.style.display = 'none';
            }
        })();

        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                dbPatch(`users/${currentUser.username}`, { status: 'offline', lastSeen: Date.now() });
            }
        });
    </script>
</body>
</html>
